syntax = "proto3";

package auth;

service AuthService {
  rpc Login (LoginRequest) returns (LoginResponse);
  rpc ValidateToken (TokenRequest) returns (UserResponse);
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string role = 2;
  string email = 3;
}

message TokenRequest {
  string token = 1;
}

message UserResponse {
  string email = 1;
  string role = 2;
}
